name: Follow Audit Log

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (via SSH)
        uses: actions/checkout@v3
        with:
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Set up SSH known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Run follow tracker
        env:
          GH_FOLLOW_TOKEN: ${{ secrets.Follow_Log }}
        run: python main.py

      - name: Force SSH for git
        run: |
          git remote set-url origin git@github.com:DRA3V50/Follow-Audit-Log.git

      - name: Commit and push changes
        run: |
          git config user.name "DRA3V50"
          git config user.email "DRA3V50@users.noreply.github.com"

          git add followers.json log.json

          git commit -m "Update follower logs [skip ci]" || echo "No changes"

          git push
