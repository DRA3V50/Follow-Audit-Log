name: Follow Audit Log

on:
  schedule:
    # Runs daily at 8 AM EST (13:00 UTC)
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Run follow tracker
        env:
          FOLLOW_LOG: ${{ secrets.FOLLOW_LOG }}
        run: python main.py

      - name: Commit and push changes
        env:
          GH_PUSH_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          git add followers.json log.json
          git commit -m "Update follower logs [skip ci]" || echo "No changes"
          git push https://x-access-token:${GH_PUSH_TOKEN}@github.com/DRA3V50/Follow-Audit-Log.git HEAD:main
