name: Follow Audit Log

on:
  schedule:
    - cron: "0 13 * * *"  # Daily at 8 AM EST
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false  # Use PAT for push

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Run follow tracker
        run: python main.py
        env:
          GH_FOLLOW_TOKEN: ${{ secrets.GH_FOLLOW_TOKEN }}

      - name: Commit and push JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add followers.json log.json
          git commit -m "Update follower logs [skip ci]" || echo "No changes to commit"
          
          git remote set-url origin https://x-access-token:${{ secrets.GH_FOLLOW_TOKEN }}@github.com/DRA3V50/Follow-Audit-Log.git
          git push origin HEAD:main
