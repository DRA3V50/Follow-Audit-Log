name: Follow Audit Log

on:
  schedule:
    - cron: "0 13 * * *"  # 8 AM EST daily
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout repo WITHOUT default GITHUB_TOKEN
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false  # disable default token

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: pip install requests

      # 4️⃣ Run your main script
      - name: Run follow tracker
        run: python main.py
        env:
          GH_FOLLOW_TOKEN: ${{ secrets.Follow_Log }}

      # 5️⃣ Commit and push JSON updates using PAT
      - name: Commit updated JSON files
        run: |
          git config user.name "DRA3V50"
          git config user.email "DRA3V50@users.noreply.github.com"
          git add followers.json log.json
          git commit -m "Update follower logs [skip ci]" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GH_FOLLOW_TOKEN }}@github.com/DRA3V50/Follow-Audit-Log.git HEAD:main
