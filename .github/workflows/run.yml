name: Follow Audit Log

on:
  schedule:
    - cron: "0 13 * * *"  # Runs daily at 8 AM EST
  workflow_dispatch:       # Allows manual trigger

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: pip install requests

      # 4️⃣ Run the follower tracker script
      - name: Run follow tracker
        run: python main.py
        env:
          GH_FOLLOW_TOKEN: ${{ secrets.GH_FOLLOW_TOKEN }}

      # 5️⃣ Commit and push updated JSON files using PAT
      - name: Commit updated JSON files
        run: |
          git config user.name "DRA3V50"
          git config user.email "DRA3V50@users.noreply.github.com"
          git add followers.json log.json
          git commit -m "Update follower logs [skip ci]" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GH_FOLLOW_TOKEN }}@github.com/DRA3V50/Follow-Audit-Log.git HEAD:main
