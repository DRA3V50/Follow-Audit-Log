name: Follow Audit Log

on:
  schedule:
    # Runs daily at 8 AM EST & 8 PM (13:00 UTC & 01:00 UTC)
    - cron: "0 13 * * *"
    - cron: "0 1 * * *"    
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repo with PAT authentication
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PUSH_TOKEN }}

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: pip install requests

      # Step 4: Run your follow/unfollow script
      - name: Run follow tracker
        env:
          FOLLOW_LOG: ${{ secrets.FOLLOW_LOG }}
        run: python main.py

      # Step 5: Commit and push follower logs
      - name: Commit and push changes
        env:
          GH_PUSH_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          git add followers.json log.json
          git commit -m "Update follower logs [skip ci]" || echo "No changes"
          git push https://x-access-token:${GH_PUSH_TOKEN}@github.com/DRA3V50/Follow-Audit-Log.git HEAD:main
