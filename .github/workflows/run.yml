name: Follow Audit Log

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Run follower tracker
        env:
          FOLLOW_LOG: ${{ secrets.FOLLOW_LOG }}
        run: python main.py

      - name: Commit and push JSON updates
        env:
          FOLLOW_LOG: ${{ secrets.FOLLOW_LOG }}
        run: |
          git config user.name "DRA3V50"
          git config user.email "DRA3V50@users.noreply.github.com"
          
          git add followers.json log.json
          git commit -m "Update follower logs [skip ci]" || echo "No changes to commit"
          
          # Use PAT to push HTTPS as yourself
          git push https://x-access-token:${FOLLOW_LOG}@github.com/DRA3V50/Follow-Audit-Log.git HEAD:main
